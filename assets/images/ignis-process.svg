<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 350" width="760" height="350" font-family="Arial, Helvetica, sans-serif">
  <rect width="760" height="350" fill="#ffffff"/>
  <!-- outer: one OS process -->
  <rect x="24" y="46" width="712" height="232" rx="22" fill="#FFF8F3" stroke="#33312F" stroke-width="2"/>
  <text x="44" y="78" font-size="19" font-weight="700" fill="#33312F">one OS process</text>

  <!-- harness (Mojo) -->
  <rect x="60" y="104" width="300" height="150" rx="14" fill="#FFF0E6" stroke="#FF5A1F" stroke-width="2.5"/>
  <text x="210" y="150" text-anchor="middle" font-size="22" font-weight="700" fill="#B3360F">Harness</text>
  <text x="210" y="180" text-anchor="middle" font-size="16" fill="#7a4a36">compiled Mojo control plane</text>
  <text x="210" y="206" text-anchor="middle" font-size="14" fill="#9a6a55">timeline · policy · tools · events</text>

  <!-- model (MAX) -->
  <rect x="400" y="104" width="300" height="150" rx="14" fill="#F3ECFF" stroke="#7C3AED" stroke-width="2.5"/>
  <text x="550" y="150" text-anchor="middle" font-size="22" font-weight="700" fill="#5B21B6">Model</text>
  <text x="550" y="180" text-anchor="middle" font-size="16" fill="#5a4a7a">MAX in-process pipeline</text>
  <text x="550" y="206" text-anchor="middle" font-size="14" fill="#7a6aa0">graph · kernels · KV cache</text>

  <!-- ember where they meet -->
  <g transform="translate(366,150) scale(0.45)">
    <path fill="#FF5A1F" d="M34 3c2.5 9.5-4 13.5-9.2 18.6C19.4 26.8 14 33 14 41a18 18 0 0 0 36 0c0-7.4-3.7-12.4-7.2-16.6-1 3-3.2 5.2-6.4 5.2C40.7 20.4 36.6 10.6 34 3z"/>
    <path fill="#FFD24A" d="M32 31c2.2 4.2 6.4 6.6 6.4 12.4a6.4 6.4 0 0 1-12.8 0C25.6 38 30 35.4 32 31z"/>
  </g>

  <text x="380" y="312" text-anchor="middle" font-size="16" fill="#55514e">in-process · shared KV cache · the model's exact tool-call bytes</text>
</svg>
