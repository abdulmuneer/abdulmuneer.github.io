<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" font-family="'Space Grotesk','Inter',sans-serif"><defs><style>.t{fill:#f7fffd;text-anchor:middle;font-size:14;font-weight:600}.n{fill:#3f5960;text-anchor:middle;font-size:13}.r{stroke:#fff;stroke-opacity:.2;stroke-width:1}</style></defs><rect width="1200" height="560" rx="20" fill="#f4faf9"/><text class="n" x="600" y="40" font-size="18" font-weight="700">PYTORCH SUPPORT LEVELS</text>
  <g transform="translate(165 70)"><rect class="r" x="0" y="385" width="870" height="48" rx="8" fill="#294653"/><text class="t" x="435" y="414">0 · visible device and compatible runtime</text><rect class="r" x="55" y="330" width="760" height="48" rx="8" fill="#275562"/><text class="t" x="435" y="359">1 · tensor, storage, stream, RNG, serialization semantics</text><rect class="r" x="110" y="275" width="650" height="48" rx="8" fill="#236773"/><text class="t" x="435" y="304">2 · useful eager operator coverage with fallback accounting</text><rect class="r" x="165" y="220" width="540" height="48" rx="8" fill="#1f7b7f"/><text class="t" x="435" y="249">3 · reference-checked workloads</text><rect class="r" x="220" y="165" width="430" height="48" rx="8" fill="#268e84"/><text class="t" x="435" y="194">4 · compiled execution</text><rect class="r" x="275" y="110" width="320" height="48" rx="8" fill="#3c9d85"/><text class="t" x="435" y="139">5 · distributed workloads</text><rect class="r" x="330" y="55" width="210" height="48" rx="8" fill="#d4774a"/><text class="t" x="435" y="84">6 · product performance</text><rect class="r" x="375" y="0" width="120" height="48" rx="8" fill="#a6513b"/><text class="t" x="435" y="29">7 · maintained</text></g>
  <text class="n" x="600" y="525">Each support level requires the contracts below it.</text></svg>
