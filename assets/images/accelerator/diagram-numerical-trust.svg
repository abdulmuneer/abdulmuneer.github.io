<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="'Space Grotesk','Inter',sans-serif"><defs><style>.t{fill:#f6fffd;text-anchor:middle;font-weight:600;font-size:14}.n{fill:#36535b;text-anchor:middle;font-size:13}.r{stroke:#fff;stroke-opacity:.22;stroke-width:1}</style></defs><rect width="1200" height="600" rx="20" fill="#f5faf9"/><text class="n" x="600" y="38" font-size="18" font-weight="700">NUMERICAL VALIDATION BY SYSTEM LEVEL</text>
  <g transform="translate(170 72)"><rect class="r" x="0" y="390" width="860" height="55" rx="9" fill="#244653"/><text class="t" x="430" y="423">instruction, conversion, rounding, special values</text><rect class="r" x="55" y="325" width="750" height="55" rx="9" fill="#245966"/><text class="t" x="430" y="358">operator values, shapes, layouts, and errors</text><rect class="r" x="110" y="260" width="640" height="55" rx="9" fill="#226d76"/><text class="t" x="430" y="293">gradients, AMP policy, RNG, determinism</text><rect class="r" x="165" y="195" width="530" height="55" rx="9" fill="#24817e"/><text class="t" x="430" y="228">fused subgraphs and compiled parity</text><rect class="r" x="220" y="130" width="420" height="55" rx="9" fill="#34907e"/><text class="t" x="430" y="163">model activations, logits, loss</text><rect class="r" x="275" y="65" width="310" height="55" rx="9" fill="#c56b46"/><text class="t" x="430" y="98">task quality and stability</text><rect class="r" x="330" y="0" width="200" height="55" rx="9" fill="#944b3b"/><text class="t" x="430" y="33">long-run convergence</text></g>
  <text class="n" x="600" y="552">Finite outputs still require reference and workload checks.</text><text class="n" x="600" y="575">Document the numerical reason for every tolerance increase.</text></svg>
