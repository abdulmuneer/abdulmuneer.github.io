<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 620" width="1240" height="620" font-family="'Space Grotesk','Inter',sans-serif"><defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M1 1L6 4L1 7" fill="none" stroke="#748e94" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><style>.t{fill:#f6fffd;text-anchor:middle;font-weight:600;font-size:14}.n{fill:#36535b;text-anchor:middle;font-size:13}.e{fill:none;stroke:#748e94;stroke-width:2.5;marker-end:url(#a)}.b{fill:#173d49;stroke:#42bda8;stroke-width:2}.c{fill:#694331;stroke:#e68a57;stroke-width:2}</style></defs><rect width="1240" height="620" rx="20" fill="#f5faf9"/><text class="n" x="620" y="38" font-size="18" font-weight="700">RUNTIME PATHS BY WORKLOAD</text>
  <g class="e"><path d="M620 180L155 285M620 180L465 285M620 180L775 285M620 180L1085 285"/></g>
  <rect class="b" x="340" y="70" width="560" height="112" rx="18"/><text class="t" x="620" y="105" font-size="17">SHARED PLATFORM</text><text class="t" x="620" y="135">runtime · tensors · kernels · compiler · numerics</text><text class="t" x="620" y="159">memory · communication · profiling</text>
  <g><rect class="b" x="45" y="285" width="220" height="190" rx="14"/><text class="t" x="155" y="319" font-size="16">TRAINING</text><text class="t" x="155" y="350">forward + backward</text><text class="t" x="155" y="378">optimizer and RNG state</text><text class="t" x="155" y="406">gradient collectives</text><text class="t" x="155" y="434">convergence</text><rect class="b" x="355" y="285" width="220" height="190" rx="14"/><text class="t" x="465" y="319" font-size="16">ONLINE INFERENCE</text><text class="t" x="465" y="350">admission and queues</text><text class="t" x="465" y="378">KV and batching</text><text class="t" x="465" y="406">streaming and cancel</text><text class="t" x="465" y="434">tail latency</text><rect class="b" x="665" y="285" width="220" height="190" rx="14"/><text class="t" x="775" y="319" font-size="16">OFFLINE INFERENCE</text><text class="t" x="775" y="350">bucketing and batches</text><text class="t" x="775" y="378">input and output I/O</text><text class="t" x="775" y="406">retry and progress</text><text class="t" x="775" y="434">cost per item</text><rect class="c" x="975" y="285" width="220" height="190" rx="14"/><text class="t" x="1085" y="319" font-size="16">MEDIA + AI</text><text class="t" x="1085" y="350">decode and surfaces</text><text class="t" x="1085" y="378">colors and layouts</text><text class="t" x="1085" y="406">compute interop</text><text class="t" x="1085" y="434">encode and quality</text></g>
  <rect x="185" y="515" width="870" height="58" rx="12" fill="#fff" stroke="#e68a57" stroke-width="2"/><text class="n" x="620" y="540" font-weight="700">SHARED BOTTLENECKS: memory bandwidth · power · caches · copy engines · network</text><text class="n" x="620" y="561">Compute, media, copy, and network engines contend for shared package resources.</text></svg>
