<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" font-family="'Space Grotesk','Inter',sans-serif"><defs><style>.t{fill:#f5fffc;text-anchor:middle;font-weight:600;font-size:14}.n{fill:#36535b;text-anchor:middle;font-size:13}.e{fill:none;stroke:#78949a;stroke-width:2}.c{fill:#153a46;stroke:#4bc2aa;stroke-width:2}.m{fill:#654130;stroke:#eb8b56;stroke-width:2}</style></defs><rect width="1200" height="620" rx="20" fill="#f5faf9"/><text class="n" x="600" y="38" font-size="18" font-weight="700">ACCELERATOR HARDWARE CONTRACT</text>
  <g class="e"><path d="M600 132V480M375 190H230M825 190h145M375 415H230M825 415h145"/></g>
  <rect x="330" y="70" width="540" height="470" rx="28" fill="#e9f4f1" stroke="#d27248" stroke-width="4"/><text class="n" x="600" y="104" font-weight="700">ACCELERATOR PACKAGE</text>
  <g><rect class="c" x="375" y="130" width="125" height="62" rx="10"/><text class="t" x="437" y="158">scalar +</text><text class="t" x="437" y="177">control</text><rect class="c" x="537" y="130" width="125" height="62" rx="10"/><text class="t" x="600" y="167">vector / SIMD</text><rect class="c" x="700" y="130" width="125" height="62" rx="10"/><text class="t" x="762" y="158">matrix +</text><text class="t" x="762" y="177">tensor</text>
    <rect class="m" x="375" y="220" width="205" height="58" rx="10"/><text class="t" x="477" y="255">copy and async engines</text><rect class="m" x="620" y="220" width="205" height="58" rx="10"/><text class="t" x="722" y="245">media, compression,</text><text class="t" x="722" y="264">security, network</text>
    <rect class="c" x="375" y="310" width="450" height="55" rx="10"/><text class="t" x="600" y="343">registers · local SRAM · caches · coherence</text><rect class="m" x="375" y="395" width="450" height="55" rx="10"/><text class="t" x="600" y="428">HBM · controllers · die-to-die fabric</text><rect class="c" x="375" y="480" width="450" height="38" rx="10"/><text class="t" x="600" y="504">telemetry · faults · counters · partitioning</text></g>
  <g><rect x="35" y="135" width="195" height="110" rx="12" fill="#fff" stroke="#d27248" stroke-width="2"/><text class="n" x="132" y="168" font-weight="700">PHYSICAL LIMITS</text><text class="n" x="132" y="194">process and yield</text><text class="n" x="132" y="218">power and cooling</text><rect x="970" y="135" width="195" height="110" rx="12" fill="#fff" stroke="#4bc2aa" stroke-width="2"/><text class="n" x="1067" y="168" font-weight="700">HOST PATH</text><text class="n" x="1067" y="194">PCIe / CXL</text><text class="n" x="1067" y="218">CPU and host memory</text><rect x="35" y="360" width="195" height="110" rx="12" fill="#fff" stroke="#4bc2aa" stroke-width="2"/><text class="n" x="132" y="393" font-weight="700">SCALE-UP</text><text class="n" x="132" y="419">peer access</text><text class="n" x="132" y="443">coherent or explicit</text><rect x="970" y="360" width="195" height="110" rx="12" fill="#fff" stroke="#d27248" stroke-width="2"/><text class="n" x="1067" y="393" font-weight="700">SCALE-OUT</text><text class="n" x="1067" y="419">NIC, switch, network</text><text class="n" x="1067" y="443">routing and congestion</text></g><text class="n" x="600" y="584">Target contract: instructions, memory, commands, topology, faults, and physical limits.</text></svg>
