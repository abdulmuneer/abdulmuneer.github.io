<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 610" width="1200" height="610" font-family="'Space Grotesk','Inter',sans-serif"><defs><style>.t{fill:#f5fffc;text-anchor:middle;font-weight:600;font-size:14}.n{fill:#35525a;text-anchor:middle;font-size:13}.e{fill:none;stroke:#789499;stroke-width:2}.b{fill:#173d49;stroke:#43bda8;stroke-width:2}.c{fill:#6b4330;stroke:#e78b57;stroke-width:2}</style></defs><rect width="1200" height="610" rx="20" fill="#f5faf9"/><text class="n" x="600" y="38" font-size="18" font-weight="700">WORKLOAD-TO-HARDWARE KERNEL MAPPING</text>
  <g class="e"><path d="M250 145H430M770 145h180M600 230V285M600 390V455M300 505h180M720 505h180"/></g>
  <g><rect class="c" x="65" y="85" width="310" height="120" rx="14"/><text class="t" x="220" y="117">INPUT PROPERTIES</text><text class="t" x="220" y="145">shape · dtype · layout</text><text class="t" x="220" y="170">batch · sparsity · reuse</text><rect class="c" x="825" y="85" width="310" height="120" rx="14"/><text class="t" x="980" y="117">TARGET PROPERTIES</text><text class="t" x="980" y="145">instructions · registers · SRAM</text><text class="t" x="980" y="170">cache · HBM · occupancy</text>
    <rect class="b" x="430" y="82" width="340" height="145" rx="18"/><text class="t" x="600" y="116" font-size="17">ALGORITHM FAMILY</text><text class="t" x="600" y="148">tile · pipeline · fragments</text><text class="t" x="600" y="174">synchronization · epilogue</text><text class="t" x="600" y="200">tail and workspace</text>
    <rect class="b" x="360" y="285" width="480" height="105" rx="16"/><text class="t" x="600" y="319">LEGALITY PREDICATE + NUMERICAL MODE</text><text class="t" x="600" y="349">resource limits · alignment · accumulation</text><text class="t" x="600" y="373">error behavior</text><rect class="b" x="440" y="455" width="320" height="86" rx="14"/><text class="t" x="600" y="487">MEASURED DISPATCH</text><text class="t" x="600" y="516">cost model · autotune · cache</text></g>
