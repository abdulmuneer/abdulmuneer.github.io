<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" font-family="'Space Grotesk','Inter',sans-serif">
  <defs><style>.h{fill:#102b38;stroke:#247e86;stroke-width:2}.s{fill:#173f4b;stroke:#44bda9;stroke-width:2}.l{fill:#5b372c;stroke:#e48657;stroke-width:2}.t{fill:#f3fffc;text-anchor:middle;font-weight:600}.n{fill:#34505a;text-anchor:middle;font-size:13}.a{fill:none;stroke:#607c84;stroke-width:3}</style></defs>
  <rect width="1200" height="620" rx="20" fill="#f5faf9"/>
  <text x="600" y="34" class="n" font-size="18" font-weight="700">ACCELERATOR HARDWARE AND SOFTWARE STACK</text>
  <g class="a"><path d="M600 80V540"/><path d="M290 300H90"/><path d="M910 300h200"/></g>
  <g>
    <rect class="h" x="390" y="55" width="420" height="52" rx="10"/><text class="t" x="600" y="86">User program and workload contract</text>
    <rect class="s" x="390" y="126" width="420" height="52" rx="10"/><text class="t" x="600" y="157">Framework tensors, dispatch, autograd</text>
    <rect class="s" x="390" y="197" width="420" height="52" rx="10"/><text class="t" x="600" y="228">Graph compiler and kernel libraries</text>
    <rect class="h" x="390" y="268" width="420" height="52" rx="10"/><text class="t" x="600" y="299">Runtime, memory, queues, collectives</text>
    <rect class="h" x="390" y="339" width="420" height="52" rx="10"/><text class="t" x="600" y="370">User driver, kernel driver, firmware</text>
    <rect class="l" x="390" y="410" width="420" height="52" rx="10"/><text class="t" x="600" y="441">Compute, storage, and on-package fabric</text>
    <rect class="l" x="390" y="481" width="420" height="52" rx="10"/><text class="t" x="600" y="512">Package, board, host, and network</text>
  </g>
  <g><rect x="55" y="220" width="235" height="160" rx="14" fill="#fff" stroke="#e48657" stroke-width="2"/><text class="n" x="172" y="255" font-weight="700">PHYSICAL LIMITS</text><text class="n" x="172" y="287">process and yield</text><text class="n" x="172" y="315">power and cooling</text><text class="n" x="172" y="343">signal integrity and cost</text></g>
  <g><rect x="910" y="190" width="245" height="220" rx="14" fill="#fff" stroke="#44bda9" stroke-width="2"/><text class="n" x="1032" y="225" font-weight="700">CROSS-CUTTING VALIDATION</text><text class="n" x="1032" y="257">correctness and numerics</text><text class="n" x="1032" y="285">performance and power</text><text class="n" x="1032" y="313">security and isolation</text><text class="n" x="1032" y="341">reliability and recovery</text><text class="n" x="1032" y="369">packaging and compatibility</text></g>
  <text x="600" y="582" class="n">Validation covers every boundary from user API to physical device.</text>
</svg>
