<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="1600" height="500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5C0F0C"/>
      <stop offset="0.5" stop-color="#D8401A"/>
      <stop offset="1" stop-color="#FF9A2E"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="500" fill="url(#g)"/>
  <g fill="#ffffff" opacity="0.06">
    <circle cx="230" cy="120" r="70"/>
    <circle cx="380" cy="78" r="22"/>
  </g>
  <!-- waveform with a gate: bright bars pass, faint bars are held back -->
  <g stroke-linecap="round">
    <g stroke="#ffffff" opacity="0.85" stroke-width="9">
      <line x1="430" y1="250" x2="430" y2="250"/>
      <line x1="430" y1="222" x2="430" y2="278"/>
      <line x1="470" y1="200" x2="470" y2="300"/>
      <line x1="510" y1="170" x2="510" y2="330"/>
      <line x1="550" y1="210" x2="550" y2="290"/>
      <line x1="590" y1="150" x2="590" y2="350"/>
      <line x1="630" y1="190" x2="630" y2="310"/>
      <line x1="670" y1="160" x2="670" y2="340"/>
      <line x1="710" y1="205" x2="710" y2="295"/>
      <line x1="750" y1="180" x2="750" y2="320"/>
    </g>
    <!-- the gate -->
    <line x1="800" y1="120" x2="800" y2="380" stroke="#ffffff" opacity="0.9" stroke-width="4"/>
    <g stroke="#ffffff" opacity="0.16" stroke-width="9">
      <line x1="850" y1="235" x2="850" y2="265"/>
      <line x1="890" y1="240" x2="890" y2="260"/>
      <line x1="930" y1="232" x2="930" y2="268"/>
      <line x1="970" y1="242" x2="970" y2="258"/>
      <line x1="1010" y1="236" x2="1010" y2="264"/>
      <line x1="1050" y1="244" x2="1050" y2="256"/>
      <line x1="1090" y1="234" x2="1090" y2="266"/>
      <line x1="1130" y1="241" x2="1130" y2="259"/>
      <line x1="1170" y1="238" x2="1170" y2="262"/>
    </g>
  </g>
  <g stroke="#ffffff" opacity="0.08" stroke-width="2" fill="none">
    <path d="M0 430 C 300 380, 600 470, 900 410 S 1500 360, 1600 420"/>
  </g>
</svg>
