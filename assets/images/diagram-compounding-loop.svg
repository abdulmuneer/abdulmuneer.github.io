  <rect x="700" y="64" width="180" height="52" rx="11" fill="#7A5A2A" stroke="#5d451f" stroke-width="1.5"/>
  <text class="t" x="790" y="86" font-size="13">Verification</text>
  <text class="t" x="790" y="104" font-size="13">evidence</text>

  <rect x="715" y="254" width="150" height="52" rx="11" fill="#4E6B2A" stroke="#3a5120" stroke-width="1.5"/>
  <text class="t" x="790" y="285" font-size="14">Learning</text>

  <rect x="420" y="254" width="200" height="52" rx="11" fill="#A8861F" stroke="#836615" stroke-width="1.5"/>
  <text class="t" x="520" y="277" font-size="12.5">Tests, skills, docs,</text>
  <text class="t" x="520" y="294" font-size="12.5">tools, patterns</text>

  <rect x="162" y="254" width="176" height="52" rx="11" fill="#A8861F" stroke="#836615" stroke-width="1.5"/>
  <text class="t" x="250" y="277" font-size="13">Better future</text>
  <text class="t" x="250" y="294" font-size="13">context</text>
