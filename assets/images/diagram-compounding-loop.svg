<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" width="920" height="360" font-family="'Space Grotesk','Inter',sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#6f5a1f"/></marker>
    <marker id="arfb" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#8a6a1a"/></marker>
    <style>
      .t{fill:#fff;text-anchor:middle;font-weight:600;}
      .e{fill:none;stroke:#6f5a1f;stroke-width:2.2;}
      .fb{fill:none;stroke:#8a6a1a;stroke-width:2.2;stroke-dasharray:6 5;}
    </style>
  </defs>

  <!-- edges -->
  <path class="e" d="M205,90 L251,90" marker-end="url(#ar)"/>
  <path class="e" d="M425,90 L471,90" marker-end="url(#ar)"/>
  <path class="e" d="M645,90 L696,90" marker-end="url(#ar)"/>
  <path class="e" d="M790,116 L790,250" marker-end="url(#ar)"/>
  <path class="e" d="M715,280 L624,280" marker-end="url(#ar)"/>
  <path class="e" d="M420,280 L342,280" marker-end="url(#ar)"/>
  <path class="fb" d="M250,254 C 258,176 302,150 336,120" marker-end="url(#arfb)"/>
  <text x="205" y="188" font-size="11" fill="#8a6a1a" font-weight="600" text-anchor="middle">compounds</text>

  <!-- nodes -->
  <rect x="35" y="64" width="170" height="52" rx="26" fill="#A8861F" stroke="#836615" stroke-width="1.5"/>
  <text class="t" x="120" y="94" font-size="14">Human goal</text>

  <rect x="255" y="64" width="170" height="52" rx="11" fill="#4E6B2A" stroke="#3a5120" stroke-width="1.5"/>
