<link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono&display=swap">

<!-- Mermaid diagrams: render ```mermaid fenced blocks. Activates only on pages that contain them. -->
<style>
  pre.mermaid {
    background: transparent;
    border: 0;
    padding: 0;
    margin: 2em 0;
    text-align: center;
    line-height: normal;
    overflow: visible;
  }
  pre.mermaid svg { max-width: 100%; height: auto; }
</style>
<script type="module">
  const blocks = document.querySelectorAll(".language-mermaid");
  if (blocks.length) {
    const { default: mermaid } = await import("https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs");
    mermaid.initialize({
      startOnLoad: false,
      securityLevel: "loose",
      theme: "base",
      themeVariables: {
        fontFamily: '"Space Grotesk", "Inter", system-ui, sans-serif',
        fontSize: "15px",
        lineColor: "#64748b",
        primaryColor: "#0E7C86",
        primaryBorderColor: "#0b5f66",
        primaryTextColor: "#ffffff",
        tertiaryColor: "#f1f5f9",
        edgeLabelBackground: "#ffffff"
      },
      flowchart: {
        curve: "basis",
        nodeSpacing: 55,
        rankSpacing: 65,
        padding: 14,
        htmlLabels: true,
        useMaxWidth: true
      }
    });
    blocks.forEach((block) => {
      const pre = document.createElement("pre");
      pre.className = "mermaid";
      pre.textContent = block.textContent;
      block.replaceWith(pre);
    });
    await mermaid.run();
  }
</script>
